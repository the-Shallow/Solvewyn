services:
  backend:
    build: .
    container_name: solvewyn
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - mongo
  
  mongo:
    image: mongo:latest
    container_name: mongo_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: